services:
  - type: web
    name: pay-build-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_ADMIN_NAME
        value: System Admin
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@paybuild.local
      - key: DEFAULT_ADMIN_PASSWORD
        value: Admin@123
      - key: CLIENT_URL
        sync: false
