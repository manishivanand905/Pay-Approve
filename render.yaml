services:
  - type: web
    name: pay-build-api
    env: node
    plan: free
    buildCommand: cd Server && npm install
    startCommand: cd Server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_ADMIN_NAME
        value: System Admin
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@paybuild.local
      - key: DEFAULT_ADMIN_PASSWORD
        value: Admin@123
      - key: CLIENT_URL
        value: https://your-vercel-domain.vercel.app
